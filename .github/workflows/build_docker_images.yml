name: Build Docker Images

on:
  # Allows manual run from the Actions tab
  workflow_dispatch:
    inputs:
      os_name:
        description: 'Container OS'
        required: true
        default: 'ubuntu'
        type: choice
        options:
          - 'ubuntu'
      type:
        description: 'Container type'
        required: true
        default: 'buildenv'
        type: choice
        options:
          - 'buildenv'
          - 'testenv'
          - 'runtime'
      version_tag:
        description: 'Version tag'
        required: true
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  ORG_NAME: emod-hub  # Must be lowercase

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    env:
      DFILE_NAME: ${{ format('Dockerfile.{0}.{1}', inputs.type, inputs.os_name) }}
      IMAGE_NAME: ${{ format('emod-{0}-{1}', inputs.os_name, inputs.type) }}
    permissions:
      artifact-metadata: write
      attestations: write
      id-token: write
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Create labels
        run: |
          echo "LABEL_DATE=org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.os_name}}
          file: ${{ inputs.os_name}}/${{ env.DFILE_NAME }}
          push: true
          sbom: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG_NAME }}/${{ env.IMAGE_NAME }}:${{ inputs.version_tag }}
          labels: [ ]
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG_NAME }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
